services:
  mongo:
    image: mongo:6
    container_name: bmt-mongo
    restart: always

    command: >
      mongod --replSet rs0 --bind_ip_all

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - bmt-network  

  mongo-init:
    image: mongo:6

    depends_on:
      mongo:
        condition: service_healthy

    restart: "no"

    command: >
      bash -c "
        sleep 5 &&
        mongosh --host mongo:27017 --eval '
          try {
            rs.status()
          } catch (e) {
            rs.initiate({
              _id: \"rs0\",
              members: [{ _id: 0, host: \"mongo:27017\" }]
            })
          }
        '
      "
    networks:
      - bmt-network  

  redis:
    image: redis:7-alpine
    container_name: bmt-redis
    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - bmt-network    

  backend:
    image: aashish909/bmt-backend:v1
    container_name: bmt-backend
    restart: always

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env  

    depends_on: 
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started 

    networks:
      - bmt-network               

volumes:
  mongo_data:

networks:
  bmt-network:
    driver: bridge